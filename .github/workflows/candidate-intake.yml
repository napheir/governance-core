name: candidate-intake

# P-0082 Phase 1 (#23) -- deterministic hub-side metadata validation + labeling
# on every newly-opened candidate/feedback issue. NO LLM, NO promotion. The
# promote/advise judgment is P-0082 Phase 2's scheduled routine.
#
# The script (maintainer/candidate_intake.py) reads the candidate.json embedded
# in the issue body, validates it with the real metadata validator
# (governance_core.candidates.envelope.validate_metadata), computes a
# deterministic T0-eligibility hint, and applies labels + one ack comment. It
# needs NO payload on disk and writes nothing to the hub -- the payload checks
# run at promote-time (Phase 2).

on:
  issues:
    types: [opened]

permissions:
  issues: write      # apply labels + post the ack comment
  contents: read     # checkout + pip install -e . (no envelope fetch)

jobs:
  intake:
    runs-on: ubuntu-latest
    # Cheap guard: only spin up on candidate/feedback-shaped issues. The script
    # re-checks deterministically; this just avoids running on unrelated issues.
    if: >-
      startsWith(github.event.issue.title, '[candidate]') ||
      contains(github.event.issue.body, '### candidate.json') ||
      contains(github.event.issue.title, 'feedback')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install gc (provides governance_core for the real validator + scanner)
        run: pip install -e .

      - name: Run deterministic intake
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python maintainer/candidate_intake.py
